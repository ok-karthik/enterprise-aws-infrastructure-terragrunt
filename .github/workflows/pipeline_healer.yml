name: CI Pipeline Healer
on:
  workflow_run:
    workflows: ["Terragrunt CI/CD"] # Triggers when your main validation pipeline runs
    types: [completed]

jobs:
  heal:
    runs-on: ubuntu-latest
    # Run inside the platform toolchain container to access terragrunt/terraform
    container:
      image: ghcr.io/ok-karthik/infrastructure-toolchain:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Run ONLY if the Terragrunt CI/CD run failed
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          repository: ${{ github.event.workflow_run.head_repository.full_name }}

      - name: Use Latest Healer Code from Main
        run: |
          git config --system --add safe.directory '*' || true
          git config --global --add safe.directory '*' || true
          git fetch origin main
          git checkout origin/main -- .agents

      - name: Install Dependencies
        run: |
          python3 -m pip install --break-system-packages openai requests

      - name: Run Healer Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: python3 .agents/scripts/healer_runner.py
